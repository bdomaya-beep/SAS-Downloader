<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropVault - File Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero">
        <h1>DropVault</h1>
        <p>Upload files, get instant links, and share them like a lightweight MediaFire clone.</p>
      </header>

      <!-- Public site is viewer-only. Uploads are managed in the admin panel. -->
      <section class="intro-panel card">
        <h2>Browse files</h2>
        <p class="status">This is the public file listing. To upload or manage files, visit the admin console.</p>
      </section>

      <section class="files-panel card">
        <div class="files-head">
          <h2>Your uploaded files</h2>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="filesList" class="files-list"></div>
      </section>

      <!-- Details modal -->
      <div id="detailsModal" class="modal" style="display:none">
        <div class="modal-content">
          <button id="modalClose" class="modal-close">×</button>
          <div id="modalBody"></div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
