<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropVault - File Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="topbar card">
        <div>
          <h1 class="brand">ViTECH SAS Downloader</h1>
          <p class="brand-sub">SAS Distribution Portal</p>
        </div>
        <a class="ghost-btn link-btn" href="/admin.html">Admin Panel</a>
      </header>

      <section class="hero card hero-card">
        <div>
          <h2>Access Latest and Old Version of SAS</h2>
          <p>Browse official releases from the ViTECH team, download files safely, and open full change details in one click.</p>
        </div>
        <div class="hero-stats">
          <article>
            <h3 id="totalFilesStat">0</h3>
            <p>Total Files</p>
          </article>
          <article>
            <h3 id="totalDownloadsStat">0</h3>
            <p>Total Downloads</p>
          </article>
          <article>
            <h3 id="latestVersionStat">—</h3>
            <p>Latest Version</p>
          </article>
        </div>
      </section>

      <section class="card controls-card">
        <div class="controls-grid">
          <label>
            <span>Search files</span>
            <input id="searchInput" type="text" placeholder="Search by file name, description, or version" />
          </label>
          <label>
            <span>Sort</span>
            <select id="sortSelect">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="downloads">Most downloaded</option>
              <option value="name">Name A-Z</option>
            </select>
          </label>
          <div class="controls-action">
            <button id="refreshBtn" type="button">Refresh</button>
          </div>
        </div>
      </section>

      <section class="files-panel card">
        <div class="files-head">
          <h2>Available Files</h2>
          <p id="resultsCount" class="results-count"></p>
        </div>
        <div id="filesList" class="files-list"></div>
      </section>
    </main>

    <div id="detailsModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="details"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="detailsTitle">
        <div class="modal-head">
          <h3 id="detailsTitle">File Details</h3>
          <button id="closeDetailsBtn" class="ghost-btn" type="button">Close</button>
        </div>
        <div id="detailsBody" class="details-body"></div>
      </section>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
