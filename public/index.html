<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitech SAS Downloader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero hero-compact">
        <div class="hero-inner">
          <div class="brand">
            <div class="logo">ViTech</div>
            <div class="tag">SAS Downloader</div>
          </div>
          <p class="lead">Securely share files and provide easy public downloads.</p>
        </div>
      </header>

      <!-- Public viewer area (no upload controls here) -->
      <section class="files-panel card">
        <div class="files-head">
          <div>
            <h2>Available Downloads</h2>
            <div class="sub">Browse and download public files.</div>
          </div>
          <div>
            <button id="refreshBtn" type="button" class="btn secondary">Refresh</button>
          </div>
        </div>

        <div id="filesList" class="files-list"></div>
      </section>

      <!-- Details modal -->
      <div id="detailsModal" class="modal" style="display:none">
        <div class="modal-content">
          <button id="modalClose" class="modal-close">×</button>
          <div id="modalBody"></div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <!-- Admin modal and quick access button -->
    <button id="adminBtn" class="admin-btn">Admin</button>
    <div id="adminModal" class="modal" style="display:none">
      <div class="modal-content admin-modal">
        <button id="adminClose" class="modal-close">×</button>
        <div id="adminLoginArea">
          <h3>Admin login</h3>
          <div class="admin-top">
            <input id="adminPassLocal" type="password" placeholder="Admin password" />
            <button id="adminLoginBtn">Unlock</button>
          </div>
          <p id="adminMsg" class="status"></p>
        </div>
        <div id="adminAreaLocal" style="display:none; margin-top:1rem">
          <h3>Admin panel</h3>
          <form id="adminUploadForm">
            <label class="file-picker" for="adminFileInput">
              <span>Select file to upload</span>
              <input id="adminFileInput" type="file" name="file" />
            </label>
            <button id="adminUploadBtn" type="submit">Upload</button>
          </form>
          <div id="adminListLocal" style="margin-top:1rem"></div>
        </div>
      </div>
    </div>
  </body>
</html>
