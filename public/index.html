<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropVault - File Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero">
        <h1>DropVault</h1>
        <p>Upload files, get instant links, and share them like a lightweight MediaFire clone.</p>
      </header>

      <section class="upload-panel card">
        <h2>Upload a file</h2>
        <form id="uploadForm">
          <label class="file-picker" for="fileInput">
            <span>Select file</span>
            <input id="fileInput" type="file" name="file" required />
          </label>
          <button id="uploadBtn" type="submit">Upload</button>
        </form>
        <p id="uploadStatus" class="status"></p>
      </section>

      <section class="files-panel card">
        <div class="files-head">
          <h2>Your uploaded files</h2>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="filesList" class="files-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
