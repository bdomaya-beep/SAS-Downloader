<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropVault - File Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero">
        <h1>DropVault</h1>
        <p>Browse official releases from the admin team, download files, and view full release details.</p>
      </header>

      <section class="files-panel card">
        <div class="files-head">
          <h2>Available Files</h2>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="filesList" class="files-list"></div>
      </section>
    </main>

    <div id="detailsModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="details"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="detailsTitle">
        <div class="modal-head">
          <h3 id="detailsTitle">File Details</h3>
          <button id="closeDetailsBtn" class="ghost-btn" type="button">Close</button>
        </div>
        <div id="detailsBody" class="details-body"></div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
