[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin-access"
  to = "/admin-access.html"
  status = 200

[[redirects]]
  from = "/admin-access/"
  to = "/admin-access.html"
  status = 200
