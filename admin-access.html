<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Vitech SAS Downloader</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .access-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .access-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 2rem;
        }

        .access-title {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            color: var(--text-dark);
        }

        .access-subtitle {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .access-form {
            display: grid;
            gap: 0.9rem;
        }

        .access-form label {
            font-weight: 600;
            color: var(--text-dark);
        }

        .access-form input {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.8rem 0.9rem;
            font-size: 1rem;
        }

        .access-form input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 116, 144, 0.15);
        }

        .access-note {
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.92rem;
        }

        .access-error {
            color: #b91c1c;
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.65rem 0.8rem;
            display: none;
        }

        .access-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="access-wrap">
        <section class="access-card" aria-label="Admin login">
            <h1 class="access-title">Admin Access</h1>
            <p class="access-subtitle">Enter your admin password to open the backend panel.</p>

            <form id="access-form" class="access-form">
                <div id="password-row">
                    <label for="admin-password">Password</label>
                    <input id="admin-password" type="password" autocomplete="current-password" required>
                </div>
                <div id="confirm-wrap" style="display: none;">
                    <label for="admin-password-confirm" style="margin-top: 0.8rem; display: block;">Confirm Password</label>
                    <input id="admin-password-confirm" type="password" autocomplete="new-password">
                </div>
                <button id="submit-btn" type="submit" class="btn btn-primary">Open Admin Panel</button>
                <button id="continue-admin" type="button" class="btn btn-secondary">Continue To Admin</button>
                <div id="access-error" class="access-error">Invalid password. Try again.</div>
            </form>

            <p class="access-note">Only share this URL with admins: <strong>/admin-access</strong></p>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-client.js"></script>
    <script>
        let setupMode = false;
        let openMode = false;
        const cloudMode = !!(window.vitechCloud && window.vitechCloud.enabled);

        function showError(message) {
            const error = document.getElementById('access-error');
            error.textContent = message;
            error.classList.add('show');
        }

        function clearError() {
            document.getElementById('access-error').classList.remove('show');
        }

        async function loginWithPassword(password) {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password })
            });

            if (!response.ok) {
                let message = 'Invalid password. Try again.';
                try {
                    const data = await response.json();
                    if (data && data.error) {
                        message = data.error;
                    }
                } catch {
                    // ignore parse errors
                }
                throw new Error(message);
            }

            const data = await response.json();
            sessionStorage.setItem('vitech_admin_token', data.token);
            window.location.replace('/admin');
        }

        async function bootstrapMode() {
            try {
                const continueBtn = document.getElementById('continue-admin');
                const title = document.querySelector('.access-title');
                const subtitle = document.querySelector('.access-subtitle');
                const confirmWrap = document.getElementById('confirm-wrap');
                const confirmInput = document.getElementById('admin-password-confirm');
                const passwordInput = document.getElementById('admin-password');
                const passwordRow = document.getElementById('password-row');
                const submitBtn = document.getElementById('submit-btn');

                if (cloudMode) {
                    continueBtn.style.display = 'none';
                    const status = await window.vitechCloud.getAdminSetupStatus();
                    setupMode = !status.isSetup;

                    if (setupMode) {
                        title.textContent = 'Create Admin Password';
                        subtitle.textContent = 'First-time setup for cloud mode. Create your admin password.';
                        submitBtn.textContent = 'Create Password';
                        confirmWrap.style.display = 'block';
                        confirmInput.required = true;
                        passwordInput.setAttribute('autocomplete', 'new-password');
                    } else {
                        title.textContent = 'Admin Access';
                        subtitle.textContent = 'Enter your admin password to open the backend panel.';
                        submitBtn.textContent = 'Open Admin Panel';
                        confirmWrap.style.display = 'none';
                        confirmInput.required = false;
                        passwordRow.style.display = 'block';
                    }
                    return;
                }

                const response = await fetch('/api/admin/setup-status');
                const status = response.ok ? await response.json() : { isSetup: true };

                openMode = status.managedBy === 'open';
                if (openMode) {
                    title.textContent = 'Admin Access';
                    subtitle.textContent = 'Open mode is enabled. Click below to enter admin now.';
                    submitBtn.textContent = 'Enter Admin Panel';
                    passwordRow.style.display = 'none';
                    confirmWrap.style.display = 'none';
                    passwordInput.required = false;
                    confirmInput.required = false;
                    return;
                }

                setupMode = !status.isSetup;
                if (setupMode) {
                    title.textContent = 'Create Admin Password';
                    subtitle.textContent = 'First-time setup: create your admin password to secure the panel.';
                    submitBtn.textContent = 'Create Password';
                    confirmWrap.style.display = 'block';
                    confirmInput.required = true;
                    passwordInput.setAttribute('autocomplete', 'new-password');
                }
            } catch {
                // Keep login mode if setup status check fails.
            }
        }

        document.getElementById('access-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearError();

            const password = document.getElementById('admin-password').value;
            const confirmPassword = document.getElementById('admin-password-confirm').value;

            try {
                if (cloudMode) {
                    if (setupMode) {
                        await window.vitechCloud.setupAdminPassword(password, confirmPassword);
                    }
                    await window.vitechCloud.loginAdminPassword(password);
                    window.location.replace('/admin');
                    return;
                }

                if (openMode) {
                    await loginWithPassword('open-access');
                    return;
                }

                if (setupMode) {
                    const setupResponse = await fetch('/api/admin/setup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password, confirmPassword })
                    });

                    if (!setupResponse.ok) {
                        let message = 'Failed to create password.';
                        try {
                            const data = await setupResponse.json();
                            if (data && data.error) {
                                message = data.error;
                            }
                        } catch {
                            // ignore parse errors
                        }
                        throw new Error(message);
                    }
                }

                await loginWithPassword(password);
            } catch (error) {
                showError(error.message || 'Something went wrong. Please try again.');
            }
        });

        document.getElementById('continue-admin').addEventListener('click', function() {
            if (!sessionStorage.getItem('vitech_admin_token')) {
                sessionStorage.setItem('vitech_admin_token', 'open-access');
            }
            window.location.replace('/admin');
        });

        bootstrapMode();
    </script>
</body>
</html>
